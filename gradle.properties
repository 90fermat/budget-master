# JVM memory limits
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -XX:MaxMetaspaceSize=1024m
kotlin.daemon.jvmargs=-Xmx4096m

# Android settings
android.useAndroidX=true
android.nonTransitiveRClass=true

# Compose Multiplatform / Kotlin Web settings
kotlin.code.style=official
org.jetbrains.compose.experimental.uikit.enabled=true

# Ignore disabled Native targets on non-compatible host OS (e.g. bypass iOS targets on Windows)
kotlin.native.ignoreDisabledTargets=true

