<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetMaster</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #121212;
            overflow: hidden;
        }
    </style>
    <script type="text/javascript">
        // In-app language override: LocalAppLocale (wasm) writes window.__customLocale,
        // which is surfaced as the first entry of navigator.languages so
        // Compose resources resolve the selected locale.
        window.__customLocale = null;
        Object.defineProperty(window.navigator, "languages", {
            get: () => window.__customLocale
                ? [window.__customLocale]
                : [window.navigator.language]
        });
    </script>
    <script type="text/javascript" src="webApp.js" defer></script>
</head>
<body>
</body>
</html>
