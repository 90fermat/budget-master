name: Release

# Cut a release by pushing a tag: `git tag v1.2.0 && git push origin v1.2.0`.
# composeApp reads the version straight from that tag (v1.2.0 -> versionName 1.2.0,
# versionCode 10200), so the artifact is named by the tag it was built from.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  android:
    name: Android (AAB + APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # `git describe --tags` needs the tags, and the default checkout is shallow with none.
          # Without this the build silently falls back to 0.1.0 and ships a mislabelled artifact.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        # Absent secrets produce an unsigned build rather than a failure, so a fork or a dry run
        # still gets a usable artifact.
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Build AAB and APK
        # GEMINI_API_KEY is deliberately NOT passed: a release build refuses to embed it anyway
        # (see feature/dashboard/build.gradle.kts), and it must never reach a public artifact.
        env:
          ANDROID_KEYSTORE_FILE: release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :composeApp:bundleRelease :composeApp:assembleRelease --stacktrace

      - name: Remove keystore
        if: always()
        run: rm -f release.jks

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            composeApp/build/outputs/bundle/release/*.aab
            composeApp/build/outputs/apk/release/*.apk
          retention-days: 30

  web:
    name: Web (Wasm) distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Wasm distribution
        run: ./gradlew :webApp:wasmJsBrowserDistribution --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: webApp/build/dist/wasmJs/productionExecutable/
          retention-days: 30
